<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8"/>
    <title>Dashboard - SecureApp</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<nav>
    <span class="brand">SecureApp</span>
    <div class="nav-links">
        <a th:href="@{/profile}">Profile</a>
        <a th:if="${isAdmin}" th:href="@{/admin}">Admin Panel</a>
        <form th:action="@{/logout}" method="post" style="display:inline;">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <button type="submit" class="btn-link">Logout</button>
        </form>
    </div>
</nav>

<main class="container">
    <h1>Dashboard</h1>
    <p>Welcome back, <strong th:text="${displayName ?: username}">User</strong>!</p>

    <div class="card">
        <h2>Your Account</h2>
        <p><strong>Username:</strong> <span th:text="${username}"></span></p>
        <p><strong>Role:</strong>
            <span th:text="${isAdmin} ? 'Administrator' : 'User'"></span>
        </p>
        <p><strong>Status:</strong>
            <span th:text="${user?.enabled} ? 'Active' : 'Disabled'"></span>
        </p>
    </div>

    <div th:if="${isAdmin}" class="card">
        <h2>Admin Tools</h2>
        <a class="btn" th:href="@{/admin}">Admin Dashboard</a>
        <a class="btn btn-outline" th:href="@{/admin/users}">Manage Users</a>
    </div>
</main>
</body>
</html>
