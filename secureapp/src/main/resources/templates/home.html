<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8"/>
    <title>SecureApp - Home</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<nav>
    <span class="brand">SecureApp</span>
    <div class="nav-links">
        <sec:authorize access="isAuthenticated()">
            <a th:href="@{/dashboard}">Dashboard</a>
            <form th:action="@{/logout}" method="post" style="display:inline;">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button type="submit" class="btn-link">Logout</button>
            </form>        </sec:authorize>
        <sec:authorize access="isAnonymous()">
            <a th:href="@{/login}">Login</a>
            <a th:href="@{/register}">Register</a>
        </sec:authorize>
    </div>
</nav>

<main class="container">
    <h1>Welcome to SecureApp</h1>
    <p>A Spring Boot application demonstrating Spring Security, i18n, structured logging and profile-based configuration.</p>

    <sec:authorize access="isAuthenticated()">
        <p>Hello, <strong th:text="${username}">user</strong>! You are logged in.</p>
        <a class="btn" th:href="@{/dashboard}">Go to Dashboard</a>
    </sec:authorize>

    <sec:authorize access="isAnonymous()">
        <a class="btn" th:href="@{/login}">Login</a>
        <a class="btn btn-outline" th:href="@{/register}">Create Account</a>
    </sec:authorize>
</main>
</body>
</html>
